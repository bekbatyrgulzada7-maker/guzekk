<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Booking by Gulzada</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#F4F3EF;
    color:#333;
}

h1{
    text-align:center;
    color:#677D73;
}

.buttons{
    text-align:center;
    margin-bottom:20px;
}

button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    margin:5px;
    cursor:pointer;
}

.section{
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:15px;
}

.section h2{
    cursor:pointer;
    color:#677D73;
}

.content{
    display:none;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.cell{
    padding:10px;
    border-radius:15px;
    text-align:center;
    font-size:14px;
}

.free{background:#A7CFA5;}
.booked{background:#E26D6D;}
.complimentary{background:#E8D27C;}
.event{background:#7DAAE3;}

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
}

input,select,textarea{
    width:100%;
    margin-top:5px;
    padding:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Cabana Booking by Gulzada</h1>

<div class="buttons">

<button onclick="savePDF('Escape')">🏝️ Escape PDF</button>
<button onclick="savePDF('Lotus')">🪷 Lotus PDF</button>
<button onclick="savePDF('Joystone')">🏖️ Joy Stone PDF</button>

</div>

<div id="sections"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Edit Cabana</h3>

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold by">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

// DATA
const dataTypes = [
    {name:"Escape", icon:"🏝️", count:10},
    {name:"Lotus", icon:"🪷", count:8},
    {name:"Joystone", icon:"🏖️", count:6}
];

let data = JSON.parse(localStorage.getItem("data")) || {};

dataTypes.forEach(t=>{
    if(!data[t.name]){
        data[t.name] = [];
        for(let i=0;i<t.count;i++){
            data[t.name].push({
                room:"",
                sold:"",
                status:"free",
                meal:"BB",
                emoji:"",
                notes:""
            });
        }
    }
});

// RENDER
const sections=document.getElementById("sections");

dataTypes.forEach(t=>{

    const div=document.createElement("div");
    div.className="section";

    div.innerHTML=`
        <h2 onclick="toggle('${t.name}')">${t.icon} ${t.name}</h2>
        <div class="content" id="${t.name}">
            <div class="grid"></div>
        </div>
    `;

    sections.appendChild(div);
    render(t.name);
});

function render(name){

    const grid=document.querySelector(`#${name} .grid`);
    grid.innerHTML="";

    data[name].forEach((c,i)=>{

        const div=document.createElement("div");

        div.className="cell "+c.status;

        div.innerHTML=`
            <b>${name} ${i+1}</b><br>
            Room: ${c.room||"-"}<br>
            ${c.emoji||""}
        `;

        div.onclick=()=>open(name,i);

        grid.appendChild(div);
    });
}

// TOGGLE
function toggle(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display==="block"?"none":"block";
}

// MODAL
let curName,curIndex;

function open(name,i){
    curName=name;
    curIndex=i;

    const c=data[name][i];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    notes.value=c.notes;

    modal.style.display="flex";
}

function save(){

    data[curName][curIndex]={
        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        notes:notes.value
    };

    localStorage.setItem("data",JSON.stringify(data));

    modal.style.display="none";

    render(curName);
}

// PDF FUNCTION (FULL PAGE)
function savePDF(name){

    const icon = {
        Escape:"🏝️",
        Lotus:"🪷",
        Joystone:"🏖️"
    }[name];

    let pages="";

    data[name].forEach((c,i)=>{

        pages+=`
        <div style="
            height:100vh;
            padding:40px;
            box-sizing:border-box;
            page-break-after:always;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            background:${
                c.status==="free"?"#A7CFA5":
                c.status==="booked"?"#E26D6D":
                c.status==="complimentary"?"#E8D27C":
                "#7DAAE3"
            };
        ">

            <h1 style="font-size:50px;margin:0;">
                ${icon} ${name}
            </h1>

            <h2>Cabana ${i+1}</h2>

            <p style="font-size:22px;">Room: ${c.room||"-"}</p>
            <p style="font-size:22px;">Sold: ${c.sold||"-"}</p>
            <p style="font-size:22px;">Meal: ${c.meal}</p>
            <p style="font-size:22px;">${c.emoji||""}</p>
            <p style="font-size:18px;">${c.notes||""}</p>

        </div>
        `;
    });

    const container=document.createElement("div");
    container.innerHTML=pages;

    html2pdf()
    .set({
        margin:0,
        filename:name+".pdf",
        html2canvas:{scale:2},
        jsPDF:{format:"a4",orientation:"portrait"}
    })
    .from(container)
    .save();
}

</script>

</body>
</html>
