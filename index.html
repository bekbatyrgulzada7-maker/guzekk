<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana System Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: Arial;
    margin:0;
    padding:20px;
    background:#F4F3EF;
}

h1{
    text-align:center;
    color:#677D73;
}

/* TOP BUTTONS */
.top{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:15px;
    cursor:pointer;
}

/* INFO */
.info{
    display:none;
    background:white;
    padding:10px;
    border-radius:12px;
    margin-bottom:15px;
}

/* SECTION */
.section{
    background:white;
    padding:15px;
    border-radius:18px;
    margin-bottom:15px;
}

.section h2{
    margin:0 0 10px 0;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

/* CELL */
.cell{
    padding:10px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    font-size:13px;
}

/* COLORS */
.free{background:#A7CFA5;}
.booked{background:#E26D6D;}
.complimentary{background:#E8D27C;}
.event{background:#7DAAE3;}
.villa{background:#FFA500;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:12px;
    width:300px;
}

input,select,textarea{
    width:100%;
    margin:6px 0;
    padding:8px;
}

/* PDF */
.pdf{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.pdfBox{
    padding:12px;
    border-radius:10px;
    font-size:12px;
}

</style>
</head>

<body>

<h1>🌴 Cabana System</h1>

<div class="top">
<button onclick="toggleInfo()">ℹ️ Info</button>
<button onclick="makePDF('Escape 🏝️')">Escape PDF</button>
<button onclick="makePDF('Lotus 🪷')">Lotus PDF</button>
<button onclick="makePDF('JoyStone 🏖️')">JoyStone PDF</button>
</div>

<div id="info" class="info">
🟩 Free<br>
🟥 Booked<br>
🟨 Complimentary<br>
🟦 Event<br>
🟧 Villa
</div>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Edit</h3>

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
<option value="villa">Villa</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

/* DATA */
const types=[
 {name:"Escape 🏝️", count:21},
 {name:"Lotus 🪷", count:8},
 {name:"JoyStone 🏖️", count:18}
];

let data=JSON.parse(localStorage.getItem("cabana"))||{};

/* INIT */
types.forEach(t=>{
 if(!data[t.name]){
  data[t.name]=Array.from({length:t.count},()=>({
   room:"",sold:"",status:"free",meal:"BB",emoji:"",notes:""
  }));
 }
});

/* COLOR */
function col(s){
 if(s==="booked") return "booked";
 if(s==="complimentary") return "complimentary";
 if(s==="event") return "event";
 if(s==="villa") return "villa";
 return "free";
}

/* RENDER */
const app=document.getElementById("app");

function render(){

app.innerHTML="";

types.forEach(t=>{

const sec=document.createElement("div");
sec.className="section";

sec.innerHTML=`
<h2>${t.name}</h2>
<div class="grid" id="${t.name}"></div>
`;

app.appendChild(sec);

const grid=document.getElementById(t.name);

data[t.name].forEach((c,i)=>{

const d=document.createElement("div");
d.className="cell "+col(c.status);

d.innerHTML=`
<b>${t.name.split(" ")[0]} ${i+1}</b><br>
${c.room||"-"}<br>
${c.emoji||""}
`;

d.onclick=()=>open(t.name,i);

grid.appendChild(d);

});

});

}

/* INFO */
function toggleInfo(){
info.style.display=info.style.display==="block"?"none":"block";
}

/* MODAL */
let cur,idx;

function open(n,i){

cur=n; idx=i;

let c=data[n][i];

room.value=c.room;
sold.value=c.sold;
status.value=c.status;
meal.value=c.meal;
emoji.value=c.emoji;
notes.value=c.notes;

modal.style.display="flex";
}

function save(){

data[cur][idx]={
room:room.value,
sold:sold.value,
status:status.value,
meal:meal.value,
emoji:emoji.value,
notes:notes.value
};

localStorage.setItem("cabana",JSON.stringify(data));

modal.style.display="none";

render();
}

/* CLOSE */
modal.onclick=e=>{
if(e.target===modal) modal.style.display="none";
}

/* PDF */
function makePDF(name){

let html=`<div class="pdf">`;

data[name].forEach((c,i)=>{

let bg="#A7CFA5";

if(c.status==="booked") bg="#E26D6D";
if(c.status==="complimentary") bg="#E8D27C";
if(c.status==="event") bg="#7DAAE3";
if(c.status==="villa") bg="#FFA500";

html+=`
<div class="pdfBox" style="background:${bg}">
<b>${name} ${i+1}</b><br>
Room: ${c.room||"-"}<br>
${c.emoji||""}
</div>
`;

});

html+="</div>";

let el=document.createElement("div");
el.innerHTML=html;

html2pdf().set({
margin:0,
filename:name+".pdf",
html2canvas:{scale:2},
jsPDF:{format:"a4"}
}).from(el).save();

}

/* START */
render();

</script>

</body>
</html>
