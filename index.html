<script>

// PDF SECTION
function saveSectionPDF(secName){

    const sectionData = cabanas[secName];

    let cardsHTML = '';

    sectionData.forEach((c,i)=>{

        cardsHTML += `

        <div style="
            width:100%;
            padding:25px;
            margin-bottom:20px;
            border-radius:25px;
            box-sizing:border-box;
            page-break-inside:avoid;
            background:${
                c.status==='free'
                ? '#A7CFA5'
                : c.status==='booked'
                ? '#E26D6D'
                : c.status==='complimentary'
                ? '#E8D27C'
                : '#7DAAE3'
            };
            color:#000;
            font-family:Arial;
        ">

            <h1 style="
                margin-top:0;
                font-size:32px;
            ">
                ${
                    secName==='Escape'
                    ? '🏝️ Escape'
                    : secName==='Lotus'
                    ? '🏖️ Lotus'
                    : '🪷 Joystone'
                }
            </h1>

            <h2 style="
                font-size:28px;
                margin-bottom:20px;
            ">
                Cabana ${i+1}
            </h2>

            <p style="font-size:22px;">
                ${c.emoji || ''}
            </p>

            <p style="font-size:20px;">
                <strong>Room:</strong>
                ${c.room || '-'}
            </p>

            <p style="font-size:20px;">
                <strong>Sold By:</strong>
                ${c.sold || '-'}
            </p>

            <p style="font-size:20px;">
                <strong>Status:</strong>
                ${c.status}
            </p>

            <p style="font-size:20px;">
                <strong>Meal:</strong>
                ${c.meal}
            </p>

            <p style="font-size:20px;">
                <strong>Notes:</strong>
                ${c.notes || '-'}
            </p>

        </div>
        `;
    });

    const pdfContainer = document.createElement('div');

    pdfContainer.innerHTML = `

        <div style="
            padding:20px;
            background:white;
        ">

            <h1 style="
                text-align:center;
                font-size:40px;
                margin-bottom:30px;
                font-family:Arial;
            ">

                ${
                    secName==='Escape'
                    ? '🏝️ Escape Cabana'
                    : secName==='Lotus'
                    ? '🪷 Lotus Cabana'
                    : '🏖️ Joystone Cabana'
                }

            </h1>

            ${cardsHTML}

        </div>
    `;

    const opt = {

        margin:0.3,

        filename:
        secName + '_Cabana.pdf',

        image:{
            type:'jpeg',
            quality:1
        },

        html2canvas:{
            scale:2
        },

        jsPDF:{
            unit:'in',
            format:'a4',
            orientation:'portrait'
        }
    };

    html2pdf()
    .set(opt)
    .from(pdfContainer)
    .save();
}

</script>
