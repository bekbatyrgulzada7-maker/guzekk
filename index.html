<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Booking</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: Arial;
    background:#F4F3EF;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#677D73;
}

button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    margin:5px;
    cursor:pointer;
}

/* INFO */
.info{
    display:none;
    background:white;
    padding:10px;
    border-radius:15px;
}

/* SECTION */
.section{
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:15px;
}

/* MAIN GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

/* CELL */
.cell{
    padding:10px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
}

/* COLORS (ВАЖНО) */
.free{background:#A7CFA5 !important;}
.booked{background:#E26D6D !important;}
.complimentary{background:#E8D27C !important;}
.event{background:#7DAAE3 !important;}
.villa{background:#FFA500 !important;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:300px;
    border-radius:15px;
}

input,select,textarea{
    width:100%;
    margin:5px 0;
    padding:8px;
}

/* PDF STYLE */
.pdf-box{
    width:100%;
    font-family:Arial;
}

.pdf-title{
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
}

.pdf-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
}

.pdf-cell{
    padding:15px;
    border-radius:10px;
    font-size:14px;
}

</style>
</head>

<body>

<h1>Cabana Booking</h1>

<button onclick="toggleInfo()">ℹ️ Information</button>

<button onclick="savePDF('Escape 🏝️')">🏝️ Escape PDF</button>
<button onclick="savePDF('Lotus 🪷')">🪷 Lotus PDF</button>
<button onclick="savePDF('JoyStone 🏖️')">🏖️ JoyStone PDF</button>

<div id="info" class="info">
🟩 Free<br>
🟥 Booked<br>
🟨 Complimentary<br>
🟦 Event<br>
🟧 Villa
</div>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
<option value="villa">Villa</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

/* DATA */
const types = [
    {name:"Escape 🏝️", count:21},
    {name:"Lotus 🪷", count:8},
    {name:"JoyStone 🏖️", count:18}
];

let data = JSON.parse(localStorage.getItem("data")) || {};

types.forEach(t=>{
    if(!data[t.name]){
        data[t.name]=Array.from({length:t.count},()=>({
            room:"",
            sold:"",
            status:"free",
            meal:"BB",
            emoji:"",
            notes:""
        }));
    }
});

/* RENDER */
const app=document.getElementById("app");

function render(){

    app.innerHTML="";

    types.forEach(t=>{

        let section=document.createElement("div");
        section.className="section";

        section.innerHTML=`
            <h2 onclick="toggle('${t.name}')">${t.name}</h2>

            <div id="${t.name}" style="display:block;">
                <div class="grid">

                ${data[t.name].map((c,i)=>{

                    let status=(c.status||"free").toLowerCase().trim();

                    return `
                    <div class="cell ${status}"
                         onclick="openModal('${t.name}',${i})">

                        <b>${t.name} ${i+1}</b><br>
                        ${c.room || "-"}<br>
                        ${c.emoji || ""}

                    </div>`;
                }).join("")}

                </div>
            </div>
        `;

        app.appendChild(section);
    });
}

/* TOGGLE */
function toggle(id){
    let el=document.getElementById(id);
    el.style.display = el.style.display==="none" ? "block" : "none";
}

function toggleInfo(){
    let el=document.getElementById("info");
    el.style.display = el.style.display==="none" ? "block" : "none";
}

/* MODAL */
let cur,idx;

function openModal(n,i){

    cur=n;
    idx=i;

    let c=data[n][i];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    notes.value=c.notes;

    modal.style.display="flex";
}

function save(){

    data[cur][idx]={
        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        notes:notes.value
    };

    localStorage.setItem("data",JSON.stringify(data));

    modal.style.display="none";

    render();
}

/* CLOSE */
modal.onclick=e=>{
    if(e.target===modal) modal.style.display="none";
}

/* PDF FIXED (FULL WIDTH + 3 IN ROW) */
function savePDF(name){

    let html=`
    <div class="pdf-box">
        <div class="pdf-title">${name}</div>
        <div class="pdf-grid">
    `;

    data[name].forEach((c,i)=>{

        let bg="#A7CFA5";

        if(c.status==="booked") bg="#E26D6D";
        if(c.status==="complimentary") bg="#E8D27C";
        if(c.status==="event") bg="#7DAAE3";
        if(c.status==="villa") bg="#FFA500";

        html+=`
        <div class="pdf-cell" style="background:${bg}">
            <b>${name} ${i+1}</b><br>
            Room: ${c.room || "-"}<br>
            ${c.emoji || ""}
        </div>`;
    });

    html+=`</div></div>`;

    let el=document.createElement("div");
    el.innerHTML=html;

    html2pdf().set({
        margin:0,
        filename:name+".pdf",
        html2canvas:{scale:2},
        jsPDF:{format:"a4", orientation:"portrait"}
    }).from(el).save();
}

/* START */
render();

</script>

</body>
</html>
