<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cabana Universe • Gulzada Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Outfit',sans-serif;
    background:
    linear-gradient(135deg,#090909,#111827,#0F172A);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* BACKGROUND */

.bg1{
    position:fixed;
    width:600px;
    height:600px;
    background:#00FFD1;
    filter:blur(180px);
    opacity:0.12;
    top:-200px;
    left:-200px;
    border-radius:50%;
    z-index:-1;
}

.bg2{
    position:fixed;
    width:500px;
    height:500px;
    background:#FF0080;
    filter:blur(170px);
    opacity:0.12;
    bottom:-150px;
    right:-150px;
    border-radius:50%;
    z-index:-1;
}

/* HEADER */

.header{
    padding:40px 30px 20px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:25px;
    background:linear-gradient(135deg,#00FFD1,#007CF0);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    box-shadow:0 10px 40px rgba(0,255,209,0.3);
}

.logo h1{
    font-size:42px;
    font-weight:800;
    letter-spacing:-1px;
}

.logo p{
    opacity:0.7;
    margin-top:4px;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:14px 22px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    backdrop-filter:blur(12px);
    font-weight:600;
    transition:0.25s;
    border:1px solid rgba(255,255,255,0.08);
}

.btn:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.12);
}

.main{
    padding:10px 30px 50px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:18px;
    margin-bottom:30px;
}

.stat{
    padding:28px;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    position:relative;
    overflow:hidden;
}

.stat::before{
    content:'';
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.06);
    border-radius:50%;
    top:-40px;
    right:-40px;
}

.stat h2{
    font-size:44px;
    margin-bottom:8px;
}

.stat p{
    opacity:0.7;
}

/* SECTION */

.section{
    margin-bottom:35px;
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:15px;
}

.section-head h2{
    font-size:34px;
}

.section-tools{
    display:flex;
    gap:12px;
}

.small-btn{
    border:none;
    padding:10px 16px;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    font-weight:600;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px;
}

/* CABANA CARD */

.card{
    position:relative;
    border-radius:30px;
    overflow:hidden;
    padding:20px;
    min-height:250px;
    cursor:pointer;
    transition:0.35s;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
}

.card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.4),transparent);
    pointer-events:none;
}

.free{
    background:
    linear-gradient(135deg,#22C55E,#166534);
}

.booked{
    background:
    linear-gradient(135deg,#FF416C,#FF4B2B);
}

.vip{
    background:
    linear-gradient(135deg,#FFD700,#B8860B);
}

.event{
    background:
    linear-gradient(135deg,#00C6FF,#0072FF);
}

.cleaning{
    background:
    linear-gradient(135deg,#A855F7,#6D28D9);
}

.card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    position:relative;
    z-index:2;
}

.card-id{
    font-size:26px;
    font-weight:800;
}

.badge{
    padding:8px 12px;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    font-size:12px;
    font-weight:700;
}

.card-content{
    margin-top:35px;
    position:relative;
    z-index:2;
}

.room{
    font-size:18px;
    margin-bottom:12px;
}

.sold{
    opacity:0.85;
    margin-bottom:18px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.tag{
    padding:8px 12px;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    font-size:13px;
}

.note{
    margin-top:18px;
    font-size:13px;
    opacity:0.9;
    line-height:1.5;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:520px;
    background:#0F172A;
    border-radius:35px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.08);
    animation:show .3s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px) scale(.95);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.modal-box h2{
    font-size:34px;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    opacity:0.8;
}

input,select,textarea{
    width:100%;
    margin-bottom:18px;
    padding:15px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-family:'Outfit';
    font-size:15px;
}

textarea{
    resize:vertical;
}

.save{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#00FFD1,#007CF0);
    color:black;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

    .logo h1{
        font-size:30px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .header{
        padding:25px 18px 10px;
    }

    .main{
        padding:10px 18px 40px;
    }

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="header">

    <div class="top">

        <div class="logo">

            <div class="logo-icon">
                🏝️
            </div>

            <div>
                <h1>Cabana Universe</h1>
                <p>Luxury Resort Dashboard • Gulzada Edition</p>
            </div>

        </div>

        <div class="actions">

            <button class="btn" onclick="exportPDF()">
                📄 Export PDF
            </button>

            <button class="btn" onclick="resetAll()">
                🗑️ Reset
            </button>

        </div>

    </div>

</div>

<div class="main">

    <!-- STATS -->

    <div class="stats">

        <div class="stat">
            <h2 id="freeCount">0</h2>
            <p>Free Cabanas</p>
        </div>

        <div class="stat">
            <h2 id="bookedCount">0</h2>
            <p>Booked Today</p>
        </div>

        <div class="stat">
            <h2 id="vipCount">0</h2>
            <p>VIP Guests</p>
        </div>

        <div class="stat">
            <h2 id="eventCount">0</h2>
            <p>Events</p>
        </div>

    </div>

    <!-- ESCAPE -->

    <div class="section">

        <div class="section-head">

            <h2>🌊 Escape Area</h2>

            <div class="section-tools">

                <button class="small-btn">
                    21 Cabanas
                </button>

            </div>

        </div>

        <div class="grid" id="escapeGrid"></div>

    </div>

    <!-- LOTUS -->

    <div class="section">

        <div class="section-head">

            <h2>🌴 Lotus Pier</h2>

            <div class="section-tools">

                <button class="small-btn">
                    8 Cabanas
                </button>

            </div>

        </div>

        <div class="grid" id="lotusGrid"></div>

    </div>

    <!-- JOYSTONE -->

    <div class="section">

        <div class="section-head">

            <h2>☀️ Joystone Beach</h2>

            <div class="section-tools">

                <button class="small-btn">
                    18 Cabanas
                </button>

            </div>

        </div>

        <div class="grid" id="joystoneGrid"></div>

    </div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-box">

        <h2>Edit Cabana</h2>

        <label>Room Number</label>
        <input type="text" id="room">

        <label>Sold By</label>
        <input type="text" id="sold">

        <label>Status</label>

        <select id="status">

            <option value="free">Free</option>
            <option value="booked">Booked</option>
            <option value="vip">VIP</option>
            <option value="event">Event</option>
            <option value="cleaning">Cleaning</option>

        </select>

        <label>Meal Plan</label>

        <select id="meal">

            <option>BB</option>
            <option>All Inclusive</option>
            <option>Ultra All Inclusive</option>
            <option>VIP</option>

        </select>

        <label>Guest Type</label>

        <select id="emoji">

            <option value="">None</option>
            <option>🎂 Birthday</option>
            <option>💍 Honeymoon</option>
            <option>👶 Family</option>
            <option>⭐ Celebrity</option>
            <option>♿ Wheelchair</option>
            <option>🚭 Non Smoking</option>

        </select>

        <label>Special Notes</label>
        <textarea rows="4" id="note"></textarea>

        <button class="save" onclick="saveCabana()">
            Save Changes
        </button>

    </div>

</div>

<script>

const setup={

    Escape:21,
    Lotus:8,
    Joystone:18

};

let cabanas=
JSON.parse(localStorage.getItem('universeCabana')) || {};

for(let area in setup){

    if(!cabanas[area]){

        cabanas[area]=[];

        for(let i=1;i<=setup[area];i++){

            cabanas[area].push({

                room:'',
                sold:'',
                status:'free',
                meal:'BB',
                emoji:'',
                note:''

            });
        }
    }
}

function render(){

    renderArea('Escape','escapeGrid');
    renderArea('Lotus','lotusGrid');
    renderArea('Joystone','joystoneGrid');

    updateStats();
}

function renderArea(area,id){

    const grid=
    document.getElementById(id);

    grid.innerHTML='';

    cabanas[area].forEach((c,index)=>{

        const card=document.createElement('div');

        card.className=
        `card ${c.status}`;

        card.innerHTML=`

            <div class="card-top">

                <div class="card-id">
                    ${area} ${index+1}
                </div>

                <div class="badge">
                    ${c.meal}
                </div>

            </div>

            <div class="card-content">

                <div class="room">
                    🛏️ Room:
                    <strong>${c.room || '-'}</strong>
                </div>

                <div class="sold">
                    👤 ${c.sold || 'No Seller'}
                </div>

                <div class="tags">

                    ${
                        c.emoji
                        ?
                        `<div class="tag">${c.emoji}</div>`
                        :
                        ''
                    }

                    <div class="tag">
                        ${c.status.toUpperCase()}
                    </div>

                </div>

                <div class="note">
                    ${c.note || ''}
                </div>

            </div>

        `;

        card.onclick=()=>openModal(area,index);

        grid.appendChild(card);

    });
}

let currentArea;
let currentIndex;

function openModal(area,index){

    currentArea=area;
    currentIndex=index;

    const c=
    cabanas[area][index];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    note.value=c.note;

    modal.style.display='flex';
}

function saveCabana(){

    cabanas[currentArea][currentIndex]={

        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        note:note.value

    };

    localStorage.setItem(
        'universeCabana',
        JSON.stringify(cabanas)
    );

    modal.style.display='none';

    render();
}

modal.onclick=function(e){

    if(e.target===this){

        modal.style.display='none';
    }
}

function updateStats(){

    let free=0;
    let booked=0;
    let vip=0;
    let event=0;

    for(let area in cabanas){

        cabanas[area].forEach(c=>{

            if(c.status==='free') free++;
            if(c.status==='booked') booked++;
            if(c.status==='vip') vip++;
            if(c.status==='event') event++;

        });
    }

    freeCount.innerText=free;
    bookedCount.innerText=booked;
    vipCount.innerText=vip;
    eventCount.innerText=event;
}

function resetAll(){

    if(confirm('Reset everything?')){

        localStorage.removeItem(
            'universeCabana'
        );

        location.reload();
    }
}

function exportPDF(){

    html2pdf(document.body,{
        margin:0.2,
        filename:'Cabana_Universe.pdf',
        image:{type:'jpeg',quality:1},
        html2canvas:{scale:2},
        jsPDF:{
            unit:'in',
            format:'a4',
            orientation:'portrait'
        }
    });
}

render();

</script>

</body>
</html>
