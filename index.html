<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Booking</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: Arial;
    margin:0;
    padding:20px;
    background:#F4F3EF;
    color:#333;
}

h1{
    text-align:center;
    color:#677D73;
}

button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    margin:5px;
    cursor:pointer;
}

/* SECTION */
.section{
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:15px;
}

.section h2{
    cursor:pointer;
    color:#677D73;
}

.content{
    display:none;
    margin-top:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
    gap:10px;
}

/* CELLS */
.cell{
    padding:10px;
    border-radius:15px;
    text-align:center;
    font-size:14px;
}

/* IMPORTANT COLORS FIX */
.free{background:#A7CFA5;}
.booked{background:#E26D6D;}
.complimentary{background:#E8D27C;}
.event{background:#7DAAE3;}
.villa{background:#FFA500;} /* 🟧 NEW */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
}

input,select,textarea{
    width:100%;
    margin:5px 0 10px 0;
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

</style>
</head>

<body>

<h1>Cabana Booking by Gulzada</h1>

<!-- BUTTONS -->
<button onclick="toggle('info')">ℹ️ Information</button>
<button onclick="savePDF('Escape')">🏝️ Escape PDF</button>
<button onclick="savePDF('Lotus')">🪷 Lotus PDF</button>
<button onclick="savePDF('Joystone')">🏖️ Joy Stone PDF</button>

<!-- INFO -->
<div class="section">
<h2 onclick="toggle('info')">Information</h2>

<div class="content" id="info">

<p>🟩 Free</p>
<p>🟥 Booked</p>
<p>🟨 Complimentary</p>
<p>🟦 Event</p>
<p>🟧 Villa</p>

<p>♿ Wheelchair</p>
<p>🌶️ Allergy</p>
<p>🤧 Allergy</p>
<p>🔇 Silent</p>
<p>🚭 Non-smoker</p>

</div>
</div>

<!-- SECTIONS -->
<div id="sections"></div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
<option value="villa">Villa 🟧</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

/* FIXED DATA (ВАЖНО — ТВОИ КОЛ-ВА) */
const types = [
    {name:"Escape",icon:"🏝️",count:21},
    {name:"Lotus",icon:"🪷",count:8},
    {name:"Joystone",icon:"🏖️",count:18}
];

let data = JSON.parse(localStorage.getItem("data")) || {};

/* INIT */
types.forEach(t=>{
    if(!data[t.name]){
        data[t.name]=[];
        for(let i=0;i<t.count;i++){
            data[t.name].push({
                room:"",
                sold:"",
                status:"free",
                meal:"BB",
                emoji:"",
                notes:""
            });
        }
    }
});

/* RENDER */
const container=document.getElementById("sections");

types.forEach(t=>{

    const div=document.createElement("div");
    div.className="section";

    div.innerHTML=`
        <h2 onclick="toggle('${t.name}')">${t.icon} ${t.name}</h2>
        <div class="content" id="${t.name}">
            <div class="grid"></div>
        </div>
    `;

    container.appendChild(div);

    render(t.name);
});

/* GRID */
function render(name){

    const grid=document.querySelector(`#${name} .grid`);
    grid.innerHTML="";

    data[name].forEach((c,i)=>{

        const div=document.createElement("div");

        /* IMPORTANT FIX: COLOR ALWAYS WORKS */
        div.className="cell "+c.status;

        div.innerHTML=`
            <b>${name} ${i+1}</b><br>
            Room: ${c.room || "-"}<br>
            ${c.emoji || ""}
        `;

        div.onclick=()=>open(name,i);

        grid.appendChild(div);
    });
}

/* TOGGLE FIX (INFO WORKS NOW) */
function toggle(id){

    const el=document.getElementById(id);

    if(!el) return;

    el.style.display =
    el.style.display==="block"
    ? "none"
    : "block";
}

/* MODAL */
let cur,idx;

function open(n,i){

    cur=n;
    idx=i;

    const c=data[n][i];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    notes.value=c.notes;

    modal.style.display="flex";
}

function save(){

    data[cur][idx]={
        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        notes:notes.value
    };

    localStorage.setItem("data",JSON.stringify(data));

    modal.style.display="none";

    render(cur);
}

/* CLOSE MODAL */
modal.onclick=e=>{
    if(e.target===modal) modal.style.display="none";
}

/* PDF */
function savePDF(name){

    const icon={
        Escape:"🏝️",
        Lotus:"🪷",
        Joystone:"🏖️"
    }[name];

    let pages="";

    data[name].forEach((c,i)=>{

        let bg="#A7CFA5";

        if(c.status==="booked") bg="#E26D6D";
        if(c.status==="complimentary") bg="#E8D27C";
        if(c.status==="event") bg="#7DAAE3";
        if(c.status==="villa") bg="#FFA500";

        pages+=`
        <div style="
            height:100vh;
            padding:40px;
            box-sizing:border-box;
            page-break-after:always;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            background:${bg};
        ">

            <h1>${icon} ${name}</h1>

            <h2>Cabana ${i+1}</h2>

            <p>Room: ${c.room||"-"}</p>
            <p>Sold: ${c.sold||"-"}</p>
            <p>Meal: ${c.meal}</p>
            <p>${c.emoji||""}</p>
            <p>${c.notes||""}</p>

        </div>
        `;
    });

    const el=document.createElement("div");
    el.innerHTML=pages;

    html2pdf()
    .set({
        margin:0,
        filename:name+".pdf",
        html2canvas:{scale:2},
        jsPDF:{format:"a4",orientation:"portrait"}
    })
    .from(el)
    .save();
}

</script>

</body>
</html>
