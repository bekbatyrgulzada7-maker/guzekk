<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Booking</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: Arial;
    margin:0;
    padding:20px;
    background:#F4F3EF;
}

h1{
    text-align:center;
    color:#677D73;
}

button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    margin:5px;
}

/* INFO */
.content{
    display:none;
    background:white;
    padding:10px;
    border-radius:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.cell{
    padding:10px;
    border-radius:15px;
    text-align:center;
}

/* SCREEN COLORS */
.free{background:#A7CFA5;}
.booked{background:#E26D6D;}
.complimentary{background:#E8D27C;}
.event{background:#7DAAE3;}
.villa{background:#FFA500;}

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:300px;
    border-radius:15px;
}

input,select,textarea{
    width:100%;
    margin:5px 0;
    padding:8px;
}

</style>
</head>

<body>

<h1>Cabana Booking by Gulzada</h1>

<button onclick="toggle('info')">ℹ️ Info</button>

<button onclick="savePDF('Escape')">🏝️ Escape PDF (21)</button>
<button onclick="savePDF('Lotus')">🪷 Lotus PDF (8)</button>
<button onclick="savePDF('Joystone')">🏖️ Joy Stone PDF (18)</button>

<div id="info" class="content">
🟩 Free<br>
🟥 Booked<br>
🟨 Complimentary<br>
🟦 Event<br>
🟧 Villa
</div>

<div id="sections"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
<option value="villa">Villa 🟧</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

/* ✔ FIXED COUNTS */
const types=[
    {name:"Escape",icon:"🏝️",count:21},
    {name:"Lotus",icon:"🪷",count:8},
    {name:"Joystone",icon:"🏖️",count:18}
];

let data=JSON.parse(localStorage.getItem("data"))||{};

types.forEach(t=>{
    if(!data[t.name]){
        data[t.name]=Array.from({length:t.count},()=>({
            room:"",
            sold:"",
            status:"free",
            meal:"BB",
            emoji:"",
            notes:""
        }));
    }
});

/* RENDER */
const wrap=document.getElementById("sections");

types.forEach(t=>{

    const div=document.createElement("div");

    div.innerHTML=`
        <h2 onclick="toggle('${t.name}')">${t.icon} ${t.name}</h2>
        <div id="${t.name}" class="content">
            <div class="grid"></div>
        </div>
    `;

    wrap.appendChild(div);

    draw(t.name);
});

function draw(name){

    const grid=document.querySelector(`#${name} .grid`);
    grid.innerHTML="";

    data[name].forEach((c,i)=>{

        const div=document.createElement("div");

        div.className="cell "+c.status;

        div.innerHTML=`
            <b>${name} ${i+1}</b><br>
            Room: ${c.room||"-"}<br>
            ${c.emoji||""}
        `;

        div.onclick=()=>open(name,i);

        grid.appendChild(div);
    });
}

/* TOGGLE */
function toggle(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display==="block"?"none":"block";
}

/* MODAL */
let cur,idx;

function open(n,i){

    cur=n;
    idx=i;

    const c=data[n][i];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    notes.value=c.notes;

    modal.style.display="flex";
}

function save(){

    data[cur][idx]={
        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        notes:notes
