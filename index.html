<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana System by Gulzada</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: Arial;
    background:#F4F3EF;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#677D73;
}

/* BUTTONS */
button{
    background:#677D73;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:18px;
    margin:5px;
    cursor:pointer;
}

/* INFO */
.infoBox{
    display:none;
    background:white;
    padding:10px;
    border-radius:15px;
    margin-bottom:15px;
}

/* SECTION */
.section{
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:15px;
}

/* GRID MAIN */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

/* CELL */
.cell{
    padding:10px;
    border-radius:14px;
    text-align:center;
    cursor:pointer;
    font-size:13px;
}

/* COLORS */
.free{background:#A7CFA5;}
.booked{background:#E26D6D;}
.complimentary{background:#E8D27C;}
.event{background:#7DAAE3;}
.villa{background:#FFA500;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
}

input,select,textarea{
    width:100%;
    margin:6px 0;
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* PDF */
.pdfGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.pdfCell{
    padding:12px;
    border-radius:10px;
    font-size:12px;
}

</style>
</head>

<body>

<h1>🌴 Cabana System</h1>

<button onclick="toggleInfo()">ℹ️ Info</button>

<button onclick="savePDF('Escape')">🏝️ Escape PDF</button>
<button onclick="savePDF('Lotus')">🪷 Lotus PDF</button>
<button onclick="savePDF('JoyStone')">🏖️ JoyStone PDF</button>

<div id="info" class="infoBox">
🟩 Free<br>
🟥 Booked<br>
🟨 Complimentary<br>
🟦 Event<br>
🟧 Villa
</div>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Edit Cabana</h3>

<input id="room" placeholder="Room">
<input id="sold" placeholder="Sold by">

<select id="status">
<option value="free">Free</option>
<option value="booked">Booked</option>
<option value="complimentary">Complimentary</option>
<option value="event">Event</option>
<option value="villa">Villa</option>
</select>

<select id="meal">
<option>BB</option>
<option>All Inclusive</option>
</select>

<input id="emoji" placeholder="Emoji">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="save()">Save</button>

</div>
</div>

<script>

/* DATA */
const types=[
  {name:"Escape 🏝️", count:21},
  {name:"Lotus 🪷", count:8},
  {name:"JoyStone 🏖️", count:18}
];

let data=JSON.parse(localStorage.getItem("cabanaData"))||{};

/* INIT */
types.forEach(t=>{
    if(!data[t.name]){
        data[t.name]=Array.from({length:t.count},()=>({
            room:"",
            sold:"",
            status:"free",
            meal:"BB",
            emoji:"",
            notes:""
        }));
    }
});

/* COLOR */
function color(s){
    if(s==="booked") return "booked";
    if(s==="complimentary") return "complimentary";
    if(s==="event") return "event";
    if(s==="villa") return "villa";
    return "free";
}

/* RENDER */
const app=document.getElementById("app");

function render(){

    app.innerHTML="";

    types.forEach(t=>{

        const section=document.createElement("div");
        section.className="section";

        const id=t.name.replace(/\s/g,"");

        section.innerHTML=`
            <h2>${t.name}</h2>
            <div class="grid" id="${id}"></div>
        `;

        app.appendChild(section);

        const grid=document.getElementById(id);

        data[t.name].forEach((c,i)=>{

            const div=document.createElement("div");
            div.className="cell "+color(c.status);

            div.innerHTML=`
                <b>${t.name.split(" ")[0]} ${i+1}</b><br>
                ${c.room||"-"}<br>
                ${c.emoji||""}
            `;

            div.onclick=()=>open(t.name,i);

            grid.appendChild(div);
        });
    });
}

/* INFO */
function toggleInfo(){
    const el=document.getElementById("info");
    el.style.display=el.style.display==="block"?"none":"block";
}

/* MODAL */
let cur,idx;

function open(n,i){

    cur=n;
    idx=i;

    const c=data[n][i];

    room.value=c.room;
    sold.value=c.sold;
    status.value=c.status;
    meal.value=c.meal;
    emoji.value=c.emoji;
    notes.value=c.notes;

    modal.style.display="flex";
}

/* SAVE */
function save(){

    data[cur][idx]={
        room:room.value,
        sold:sold.value,
        status:status.value,
        meal:meal.value,
        emoji:emoji.value,
        notes:notes.value
    };

    localStorage.setItem("cabanaData",JSON.stringify(data));

    modal.style.display="none";

    render();
}

/* CLOSE */
modal.onclick=e=>{
    if(e.target===modal) modal.style.display="none";
}

/* PDF */
function savePDF(name){

    let html=`<div class="pdfGrid">`;

    data[name].forEach((c,i)=>{

        let bg="#A7CFA5";

        if(c.status==="booked") bg="#E26D6D";
        if(c.status==="complimentary") bg="#E8D27C";
        if(c.status==="event") bg="#7DAAE3";
        if(c.status==="villa") bg="#FFA500";

        html+=`
        <div class="pdfCell" style="background:${bg}">
            <b>${name} ${i+1}</b><br>
            Room: ${c.room||"-"}<br>
            ${c.emoji||""}
        </div>`;
    });

    html+="</div>";

    const el=document.createElement("div");
    el.innerHTML=html;

    html2pdf()
    .set({
        margin:0,
        filename:name+".pdf",
        html2canvas:{scale:2},
        jsPDF:{format:"a4"}
    })
    .from(el)
    .save();
}

/* START */
render();

</script>

</body>
</html>
