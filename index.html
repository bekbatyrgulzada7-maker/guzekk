<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUJO BODRUM | Booking by Gulzada</title>
    <style>
        :root {
            --lujo-orange: #FF6A00;
            --lujo-dark: #0f0f0f;
            --lujo-card: rgba(26, 26, 26, 0.96);
            --available: #2ecc71;
            --occupied: var(--lujo-orange);
            --maintenance: #e74c3c;
            --white: #ffffff;
        }

        body {
            margin: 0; font-family: 'Avenir', sans-serif; background-color: var(--lujo-dark);
            background-image: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)), url('lujo-beach.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--white); min-height: 100vh;
        }

        /* Info Button */
        .info-btn {
            position: fixed; top: 20px; right: 20px; width: 35px; height: 35px;
            border: 1px solid white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer; z-index: 100; font-weight: bold;
        }

        /* Legend Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 200; padding: 40px 20px; box-sizing: border-box;
        }

        .modal-content {
            max-width: 400px; margin: 0 auto; border: 1px solid var(--lujo-orange);
            padding: 30px; border-radius: 20px; background: var(--lujo-dark); text-align: center;
        }

        .color-example { display: flex; align-items: center; margin: 15px 0; font-size: 0.9rem; letter-spacing: 1px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; margin-right: 15px; }

        /* Hero Screen */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 2.3rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; }
        .hero h1 span { color: var(--lujo-orange); }
        .by-line { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 40px; opacity: 0.7; text-transform: uppercase; margin-top: 10px; }

        .btn-main {
            background-color: var(--lujo-orange); color: white; padding: 22px 55px; border: none;
            border-radius: 50px; font-size: 0.9rem; font-weight: bold; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255,106,0,0.4);
        }

        /* Zones Screen */
        .booking-screen { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .cabana-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; }
        
        .card { background: var(--lujo-card); border-radius: 12px; padding: 18px; border-left: 5px solid var(--available); transition: 0.3s; }
        .card.occupied { border-left-color: var(--occupied); }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--lujo-orange); letter-spacing: 1px; }
        .info-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }
        .info-data { font-size: 0.9rem; font-weight: bold; color: var(--white); }

        .back-btn { background: none; border: 1px solid white; color: white; padding: 10px 20px; border-radius: 25px; margin-bottom: 20px; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="info-btn" onclick="toggleModal(true)">i</div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--lujo-orange); letter-spacing: 3px;">LEGEND</h2>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px;">Real-time cabana booking status.</p>
            <div class="color-example"><div class="dot" style="background: var(--available);"></div> Available</div>
            <div class="color-example"><div class="dot" style="background: var(--occupied);"></div> Occupied</div>
            <div class="color-example"><div class="dot" style="background: var(--maintenance);"></div> Maintenance</div>
            <button onclick="toggleModal(false)" style="background:none; border:1px solid white; color:white; padding:12px 25px; border-radius:25px; margin-top:25px; cursor: pointer;">CLOSE</button>
        </div>
    </div>

    <div id="home-screen" class="hero">
        <h1>LUJO <span>BODRUM</span></h1>
        <div class="by-line">Cabana Booking by Gulzada</div>
        <button class="btn-main" onclick="showBooking()">Choose your cabana zone</button>
    </div>

    <div id="booking-screen" class="booking-screen">
        <button class="back-btn" onclick="goBack()">← BACK</button>
        <h2 style="text-align:center; letter-spacing:5px; text-transform: uppercase; color: var(--white);">Joy Stone Zone</h2>
        
        <div class="cabana-grid">
            <div class="card">
                <h3>CABANA № 01</h3>
                <div class="info-label">Guest Room:</div>
                <div class="info-data">Available</div>
                <div class="info-label">Pension Type:</div>
                <div class="info-data">BB / AI</div>
            </div>
            </div>
    </div>

    <script>
        function toggleModal(s) { document.getElementById('infoModal').style.display = s ? 'block' : 'none'; }
        function showBooking() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('booking-screen').style.display = 'block';
        }
        function goBack() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('booking-screen').style.display = 'none';
        }
    </script>
</body>
</html>
